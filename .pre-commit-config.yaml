# Local hooks run against the project venv so versions match CI exactly.
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: .venv/bin/python -m ruff check
        language: system
        types: [python]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: .venv/bin/python -m ruff format
        language: system
        types: [python]
        require_serial: true
      - id: mypy
        name: mypy --strict
        entry: .venv/bin/python -m mypy
        language: system
        pass_filenames: false
        types: [python]
      - id: compile
        name: byte-compile
        entry: .venv/bin/python -m compileall -q src evals
        language: system
        pass_filenames: false
        types: [python]

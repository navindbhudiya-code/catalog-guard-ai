name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create venv + install
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Build gate (lint, types, compile, imports, 100% tests, traceability)
        run: make verify

      # Phase 3+: eval F1 gate runs here against a small synthetic catalog.
      # - name: Eval F1 gate
      #   run: .venv/bin/python evals/score.py --check-baseline
